<!-- @dsCard group="Hero" viewport="1000x820" name="Nexus Core (standalone)" subtitle="Centered titanium core — core only, no content" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JAP — Nexus Core</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #070c18;
    --navy-2: #0b1428;
    --blue: #3b82f6;
    --blue-glow: #5aa0ff;
    --ice: #cfe0ff;
    --text: rgba(233, 240, 255, 0.92);
    --text-dim: rgba(180, 198, 230, 0.62);
    --line: rgba(90, 130, 200, 0.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--navy); overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; color: var(--text); }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; }

  .overlay {
    position: fixed; inset: 0; z-index: 2;
    display: flex; align-items: center;
    pointer-events: none;
  }
  .content {
    max-width: 560px;
    margin-left: clamp(24px, 7vw, 132px);
    pointer-events: none;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600; margin-bottom: 26px;
  }
  .eyebrow::before {
    content: ""; width: 26px; height: 1px; background: linear-gradient(90deg, transparent, var(--blue-glow));
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-glow); box-shadow: 0 0 12px var(--blue-glow); }
  h1 {
    font-family: 'Fredoka', sans-serif; font-weight: 700;
    font-size: clamp(40px, 6.4vw, 82px); line-height: 1.02; margin: 0;
    letter-spacing: -0.01em; color: #fff;
  }
  h1 .sub { display: block; color: var(--text-dim); font-weight: 600; font-size: 0.52em; letter-spacing: 0.01em; margin-top: 14px; }
  p.lead {
    margin: 26px 0 0; max-width: 430px;
    font-size: clamp(15px, 1.5vw, 18px); line-height: 1.65; color: var(--text-dim);
  }
  .cta-row { display: flex; gap: 16px; align-items: center; margin-top: 38px; pointer-events: auto; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 30px; border-radius: 99px; font-size: 15px; font-weight: 600;
    text-decoration: none; cursor: pointer; transition: all .3s cubic-bezier(.22,1,.36,1);
  }
  .btn-primary {
    color: #fff;
    background: linear-gradient(120deg, rgba(59,130,246,0.9), rgba(37,99,235,0.85));
    border: 1px solid rgba(140,180,255,0.4);
    box-shadow: 0 8px 30px rgba(37,99,235,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(37,99,235,0.55), inset 0 1px 0 rgba(255,255,255,0.3); }
  .btn-ghost { color: var(--text); border: 1px solid var(--line); background: rgba(255,255,255,0.02); backdrop-filter: blur(6px); }
  .btn-ghost:hover { border-color: rgba(120,160,230,0.5); color: #fff; }
  .btn .arrow { transition: transform .3s ease; }
  .btn:hover .arrow { transform: translateX(4px); }

  .specs {
    position: fixed; left: clamp(24px, 7vw, 132px); bottom: 40px; z-index: 2;
    display: flex; gap: 40px; pointer-events: none;
  }
  .spec .k { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 22px; color: #fff; }
  .spec .v { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }

  .hud {
    position: fixed; right: 34px; top: 34px; z-index: 2;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
    display: flex; align-items: center; gap: 10px; pointer-events: none;
  }
  .hud .live { width: 7px; height: 7px; border-radius: 50%; background: #47e08b; box-shadow: 0 0 10px #47e08b; animation: blink 2.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

  .loader { position: fixed; inset: 0; z-index: 5; display: grid; place-items: center; background: var(--navy); transition: opacity .8s ease; }
  .loader.hide { opacity: 0; pointer-events: none; }
  .loader .ring { width: 46px; height: 46px; border-radius: 50%; border: 2px solid rgba(120,160,230,0.2); border-top-color: var(--blue-glow); animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 820px) {
    .overlay { align-items: flex-start; padding-top: 12vh; }
    .content { margin: 0 auto; text-align: center; padding: 0 24px; }
    .eyebrow { justify-content: center; }
    .cta-row { justify-content: center; }
    .specs { left: 0; right: 0; justify-content: center; gap: 28px; }
  }
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div id="stage"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

const NAVY = 0x070c18;
const BLUE = new THREE.Color('#3b82f6');
const BLUE_GLOW = new THREE.Color('#6aa8ff');

const stage = document.getElementById('stage');
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(NAVY);
scene.fog = new THREE.FogExp2(NAVY, 0.032);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.4, 12);

const world = new THREE.Group();
scene.add(world);
function layoutWorld() {
  // standalone: keep the core centered on every viewport
  world.position.x = 0;
  world.position.y = 0;
  world.scale.setScalar(window.innerWidth > 820 ? 1 : 0.7);
}
layoutWorld();

function makeCircuitTextures() {
  const S = 1024;
  const albedo = document.createElement('canvas'); albedo.width = albedo.height = S;
  const emis = document.createElement('canvas'); emis.width = emis.height = S;
  const a = albedo.getContext('2d');
  const e = emis.getContext('2d');

  const g = a.createLinearGradient(0, 0, S, S);
  g.addColorStop(0, '#9aa3ad'); g.addColorStop(0.5, '#7f8892'); g.addColorStop(1, '#6d7680');
  a.fillStyle = g; a.fillRect(0, 0, S, S);
  for (let i = 0; i < 24000; i++) {
    const x = Math.random() * S, y = Math.random() * S;
    a.fillStyle = `rgba(${Math.random() > 0.5 ? 255 : 0},${255},${255},${Math.random() * 0.03})`;
    a.fillRect(x, y, 1, 1);
  }
  e.fillStyle = '#000'; e.fillRect(0, 0, S, S);

  const hexR = 34;
  a.strokeStyle = 'rgba(40,48,58,0.35)'; a.lineWidth = 1.4;
  for (let row = 0; row * hexR * 1.5 < S + hexR; row++) {
    for (let col = 0; col * hexR * Math.sqrt(3) < S + hexR; col++) {
      const cx = col * hexR * Math.sqrt(3) + (row % 2 ? hexR * Math.sqrt(3) / 2 : 0);
      const cy = row * hexR * 1.5;
      a.beginPath();
      for (let k = 0; k < 6; k++) {
        const ang = Math.PI / 180 * (60 * k - 30);
        const px = cx + hexR * 0.92 * Math.cos(ang), py = cy + hexR * 0.92 * Math.sin(ang);
        k ? a.lineTo(px, py) : a.moveTo(px, py);
      }
      a.closePath(); a.stroke();
    }
  }

  const drawTrace = (ctx, color, w) => {
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const lanes = 26;
    for (let i = 0; i < lanes; i++) {
      let x = Math.random() * S, y = Math.random() * S;
      ctx.beginPath(); ctx.moveTo(x, y);
      const steps = 4 + (Math.random() * 5 | 0);
      for (let s = 0; s < steps; s++) {
        if (Math.random() > 0.5) x += (Math.random() - 0.5) * 260; else y += (Math.random() - 0.5) * 260;
        x = Math.max(0, Math.min(S, x)); y = Math.max(0, Math.min(S, y));
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, w * 1.8, 0, Math.PI * 2); ctx.fill();
    }
  };
  drawTrace(a, 'rgba(28,34,44,0.7)', 3);
  drawTrace(a, 'rgba(30,36,46,0.5)', 2);
  a.save(); a.globalCompositeOperation = 'lighter';
  drawTrace(a, 'rgba(90,150,255,0.22)', 2.4); a.restore();
  drawTrace(e, 'rgba(90,160,255,0.95)', 2.6);
  drawTrace(e, 'rgba(140,200,255,0.7)', 1.6);

  const albedoTex = new THREE.CanvasTexture(albedo);
  const emisTex = new THREE.CanvasTexture(emis);
  [albedoTex, emisTex].forEach((t) => { t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; });
  return { albedoTex, emisTex };
}

const { albedoTex, emisTex } = makeCircuitTextures();

const core = new THREE.Group();
world.add(core);

const sphereGeo = new THREE.SphereGeometry(2.4, 96, 96);
const coreMat = new THREE.MeshStandardMaterial({
  map: albedoTex,
  emissiveMap: emisTex,
  emissive: BLUE_GLOW,
  emissiveIntensity: 1.15,
  metalness: 0.82,
  roughness: 0.46,
});
const sphere = new THREE.Mesh(sphereGeo, coreMat);
core.add(sphere);

const ringGeo = new THREE.TorusGeometry(2.72, 0.012, 12, 200);
const ringMat = new THREE.MeshBasicMaterial({ color: BLUE_GLOW, transparent: true, opacity: 0.5 });
const ring1 = new THREE.Mesh(ringGeo, ringMat); ring1.rotation.x = Math.PI / 2; core.add(ring1);
const ring2 = new THREE.Mesh(ringGeo, ringMat.clone()); ring2.rotation.x = Math.PI / 2.4; ring2.rotation.z = 0.5; ring2.material.opacity = 0.25; core.add(ring2);

const haloMat = new THREE.MeshBasicMaterial({ color: 0x1e3a6e, transparent: true, opacity: 0.28, side: THREE.BackSide, blending: THREE.AdditiveBlending });
const halo = new THREE.Mesh(new THREE.SphereGeometry(2.95, 48, 48), haloMat); core.add(halo);

const MODULES = ['Cloud', 'Network', 'Security', 'Database', 'DevOps', 'Automation'];
const modGroup = new THREE.Group();
world.add(modGroup);
const modules = [];
const orbitR = 4.5;

function labelSprite(text) {
  const c = document.createElement('canvas'); c.width = 320; c.height = 80;
  const x = c.getContext('2d');
  x.font = '600 34px Inter, sans-serif';
  x.fillStyle = 'rgba(220,232,255,0.95)'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.shadowColor = 'rgba(90,160,255,0.8)'; x.shadowBlur = 12;
  x.fillText(text.toUpperCase(), 160, 42);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  sp.scale.set(2.0, 0.5, 1);
  return sp;
}

const modGeo = new THREE.IcosahedronGeometry(0.32, 0);
MODULES.forEach((name, i) => {
  const a = (i / MODULES.length) * Math.PI * 2;
  const tilt = (i % 2 ? 1 : -1) * 0.5;
  const pos = new THREE.Vector3(Math.cos(a) * orbitR, Math.sin(a) * 0.9 * tilt, Math.sin(a) * orbitR);
  const g = new THREE.Group(); g.position.copy(pos);

  const mesh = new THREE.Mesh(modGeo, new THREE.MeshStandardMaterial({
    color: 0x0e1a30, emissive: BLUE, emissiveIntensity: 0.9, metalness: 0.6, roughness: 0.3, flatShading: true,
  }));
  g.add(mesh);
  const cage = new THREE.Mesh(new THREE.IcosahedronGeometry(0.44, 0), new THREE.MeshBasicMaterial({ color: BLUE_GLOW, wireframe: true, transparent: true, opacity: 0.35 }));
  g.add(cage);
  const label = labelSprite(name); label.position.set(0, 0.72, 0); g.add(label);

  modGroup.add(g);
  modules.push({ g, mesh, base: pos.clone(), phase: Math.random() * Math.PI * 2 });

  const lg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), pos]);
  const line = new THREE.Line(lg, new THREE.LineBasicMaterial({ color: BLUE_GLOW, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending }));
  world.add(line);
  modules[i].line = line;

  const pulse = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 12), new THREE.MeshBasicMaterial({ color: 0xbfe0ff, blending: THREE.AdditiveBlending, transparent: true }));
  world.add(pulse);
  modules[i].pulse = pulse; modules[i].pulseT = Math.random();
});

const grid = new THREE.GridHelper(60, 60, 0x2a4a86, 0x16294a);
grid.material.transparent = true; grid.material.opacity = 0.16;
grid.position.y = -4.2; scene.add(grid);

function makePoints(count, spread, size, color, opacity) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - 0.5) * spread;
    pos[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.6;
    pos[i * 3 + 2] = (Math.random() - 0.5) * spread;
  }
  const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ size, color, transparent: true, opacity, depthWrite: false, blending: THREE.AdditiveBlending });
  return new THREE.Points(geo, mat);
}
const nodes = makePoints(90, 34, 0.09, 0x8fb4ff, 0.7); scene.add(nodes);
const dust = makePoints(420, 40, 0.045, 0x5f86c8, 0.5); scene.add(dust);

scene.add(new THREE.AmbientLight(0x2a3a5c, 0.9));
const key = new THREE.DirectionalLight(0xbfe0ff, 2.2); key.position.set(6, 8, 6); scene.add(key);
const rim = new THREE.DirectionalLight(0x2b6cff, 1.6); rim.position.set(-8, -2, -6); scene.add(rim);
const fill = new THREE.PointLight(0x3b82f6, 40, 30); fill.position.set(0, 2, 6); world.add(fill);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.72, 0.5, 0.82);
composer.addPass(bloom);
const fxaa = new ShaderPass(FXAAShader);
composer.addPass(fxaa);
function setFxaa() {
  const pr = renderer.getPixelRatio();
  fxaa.material.uniforms['resolution'].value.set(1 / (window.innerWidth * pr), 1 / (window.innerHeight * pr));
}
setFxaa();

const pointer = { x: 0, y: 0, tx: 0, ty: 0 };
window.addEventListener('pointermove', (ev) => {
  pointer.tx = (ev.clientX / window.innerWidth - 0.5);
  pointer.ty = (ev.clientY / window.innerHeight - 0.5);
}, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  setFxaa(); layoutWorld();
});

const clock = new THREE.Clock();
const tmp = new THREE.Vector3();

function animate() {
  const t = clock.getElapsedTime();

  core.rotation.y = t * 0.06;
  core.rotation.x = Math.sin(t * 0.15) * 0.05;
  core.position.y = Math.sin(t * 0.4) * 0.12;
  ring1.rotation.z = t * 0.08;
  ring2.rotation.z = -t * 0.05;

  coreMat.emissiveIntensity = 1.0 + Math.sin(t * 1.4) * 0.28;
  halo.material.opacity = 0.24 + Math.sin(t * 1.4) * 0.06;

  modGroup.rotation.y = t * 0.08;
  modules.forEach((m, i) => {
    m.g.position.y = m.base.y + Math.sin(t * 0.9 + m.phase) * 0.22;
    m.mesh.rotation.x += 0.004; m.mesh.rotation.y += 0.006;
    m.mesh.material.emissiveIntensity = 0.8 + Math.sin(t * 2 + i) * 0.35;
    m.g.getWorldPosition(tmp); world.worldToLocal(tmp);
    const arr = m.line.geometry.attributes.position.array;
    arr[3] = tmp.x; arr[4] = tmp.y; arr[5] = tmp.z;
    m.line.geometry.attributes.position.needsUpdate = true;
    m.pulseT = (m.pulseT + 0.006) % 1;
    m.pulse.position.copy(tmp).multiplyScalar(m.pulseT);
    m.pulse.material.opacity = Math.sin(m.pulseT * Math.PI);
  });

  nodes.rotation.y = t * 0.01;
  dust.rotation.y = -t * 0.006;

  pointer.x += (pointer.tx - pointer.x) * 0.04;
  pointer.y += (pointer.ty - pointer.y) * 0.04;
  camera.position.x = pointer.x * 1.2;
  camera.position.y = 0.4 - pointer.y * 0.8;
  camera.lookAt(0, 0, 0);

  composer.render();
  requestAnimationFrame(animate);
}

if (reduce) { core.rotation.y = 0.5; composer.render(); }
else { animate(); }

function hideLoader() {
  const l = document.getElementById('loader');
  if (l && !l.classList.contains('hide')) { l.classList.add('hide'); setTimeout(() => l.remove(), 900); }
}
requestAnimationFrame(hideLoader);
setTimeout(hideLoader, 1200);
</script>
</body>
</html>
